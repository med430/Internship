scalar Date
scalar JSON

# =======================
# ENUMS
# =======================

enum ApplicationStatus {
    SUBMITTED
    IN_REVIEW
    ACCEPTED
    REJECTED
    WITHDRAWN
}

enum OfferType {
    INTERNSHIP
    PFE
    RESEARCH
    PHD
    ALTERNANCE
}

enum Role {
    STUDENT
    RECRUITER
    ADMIN
}

enum SkillLevel {
    BEGINNER
    INTERMEDIATE
    ADVANCED
    EXPERT
}

enum WorkMode {
    REMOTE
    ONSITE
    HYBRID
}

enum Gender {
    MALE
    FEMALE
    OTHER
}

enum InterviewStatus {
    IN_PROGRESS
    COMPLETED
}

enum RecruiterMode {
    EMPATHIC
    TECHNICAL
    DIRECT
}

enum SubscriptionType {
    FREE
    PAID
}

# =======================
# SUBSCRIPTION
# =======================

type SubscriptionStatus {
    type: SubscriptionType!
    isPro: Boolean!
}

# =======================
# BASE INTERFACE
# =======================

interface BaseEntity {
    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# USER
# =======================

type User implements BaseEntity {
    id: ID!
    email: String!
    name: String!
    lastname: String!
    username: String!
    role: Role!
    phone: String
    avatarUrl: String

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# SKILLS
# =======================

type Skill {
    id: ID!
    name: String!
}

type SkillAssignment {
    id: ID!
    skill: Skill!
    studentProfile: StudentProfile!
    level: SkillLevel!
}

type SkillRequirement {
    id: ID!
    skill: Skill!
    level: SkillLevel!
}

# =======================
# OFFER
# =======================

type Offer implements BaseEntity {
    id: ID!
    recruiterProfile: RecruiterProfile!

    title: String!
    description: String!
    company: String!
    location: String!
    domain: String!

    isPaid: Boolean!
    workMode: WorkMode!
    startDate: Date!
    endDate: Date!
    type: OfferType!

    skillRequirements: [SkillRequirement!]!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# CV & COVER LETTER
# =======================

type CV implements BaseEntity {
    id: ID!
    student: User!
    fileUrl: String!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

type CoverLetter implements BaseEntity {
    id: ID!
    student: User!
    fileUrl: String!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# APPLICATION
# =======================

type Application implements BaseEntity {
    id: ID!
    student: User!
    offer: Offer!
    cv: CV!
    coverLetter: CoverLetter

    status: ApplicationStatus!
    matchScore: Float!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# INTERVIEW
# =======================

type Interview {
    id: ID!
    student: User!
    offer: Offer

    company: String
    jobTitle: String
    jobDescription: String

    recruiterMode: RecruiterMode!
    status: InterviewStatus!

    score: Float!
    feedback: String!
    summary: String

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# RECOMMENDATION
# =======================

type Recommendation implements BaseEntity {
    id: ID!
    recruiter: User!
    student: User!
    description: String!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# STUDENT PROFILE COMPONENTS
# =======================

type Project {
    id: ID!
    studentProfile: StudentProfile!
    title: String!
    description: String!
    technologies: [String!]!
    githubUrl: String
    demoUrl: String
}

type Experience implements BaseEntity {
    id: ID!
    studentProfile: StudentProfile!
    company: String!
    role: String!
    startDate: Date!
    endDate: Date
    description: String

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

type Education implements BaseEntity {
    id: ID!
    studentProfile: StudentProfile!
    school: String!
    degree: String!
    field: String!
    startDate: Date!
    endDate: Date
    description: String

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

type Certification implements BaseEntity {
    id: ID!
    studentProfile: StudentProfile!
    name: String!
    organization: String!
    issueDate: Date!
    expirationDate: Date
    credentialId: String
    credentialUrl: String

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# PROFILES
# =======================

type StudentProfile {
    id: ID!
    user: User!

    bio: String
    birthDate: Date
    gender: Gender
    address: String
    city: String

    skills: [SkillAssignment!]!
    experiences: [Experience!]!
    projects: [Project!]!
    educations: [Education!]!
    certifications: [Certification!]!
    cvs: [CV!]!
}

type RecruiterProfile {
    id: ID!
    user: User!
    company: String!
    companyDescription: String
    website: String
    offers: [Offer!]!
}

# =======================
# QUERIES
# =======================

type Query {
    # ── Subscription ───────────────────────────────────────
    mySubscription: SubscriptionStatus!

    # ── Users ──────────────────────────────────────────────
    user(id: ID!): User
    users(pageNumber: Int, pageSize: Int): [User]!

    # ── Offers ─────────────────────────────────────────────
    offer(id: ID!): Offer
    offers(pageNumber: Int, pageSize: Int): [Offer]!
    myOffers: [Offer]!

    # ── Skills ─────────────────────────────────────────────
    skill(id: ID!): Skill
    skills(pageNumber: Int, pageSize: Int): [Skill]!

    # ── Skill Assignments ──────────────────────────────────
    skillAssignment(id: ID!): SkillAssignment
    skillAssignments(pageNumber: Int, pageSize: Int): [SkillAssignment]!

    # ── Applications ───────────────────────────────────────
    application(id: ID!): Application
    applications(pageNumber: Int, pageSize: Int): [Application]!

    # ── Interviews ─────────────────────────────────────────
    interview(id: ID!): Interview
    interviews(pageNumber: Int, pageSize: Int): [Interview]!

    # ── Recommendations ────────────────────────────────────
    recommendation(id: ID!): Recommendation
    recommendations(pageNumber: Int, pageSize: Int): [Recommendation]!

    # ── Profiles ───────────────────────────────────────────
    studentProfile(id: ID!): StudentProfile
    studentProfiles(pageNumber: Int, pageSize: Int): [StudentProfile]!

    recruiterProfile(id: ID!): RecruiterProfile
    recruiterProfiles(pageNumber: Int, pageSize: Int): [RecruiterProfile]!

    # ── CVs ────────────────────────────────────────────────
    cv(id: ID!): CV
    cvs(pageNumber: Int, pageSize: Int): [CV]!
    cvsByStudent(student: ID!): [CV]!

    # ── Cover Letters ──────────────────────────────────────
    coverLetter(id: ID!): CoverLetter
    coverLetters(pageNumber: Int, pageSize: Int): [CoverLetter]!

    # ── Projects ───────────────────────────────────────────
    project(id: ID!): Project
    projects(pageNumber: Int, pageSize: Int): [Project]!

    # ── Experiences ────────────────────────────────────────
    experience(id: ID!): Experience
    experiences(pageNumber: Int, pageSize: Int): [Experience]!

    # ── Educations ─────────────────────────────────────────
    education(id: ID!): Education
    educations(pageNumber: Int, pageSize: Int): [Education]!

    # ── Certifications ─────────────────────────────────────
    certification(id: ID!): Certification
    certifications(pageNumber: Int, pageSize: Int): [Certification]!
}

# =======================
# MUTATIONS
# =======================

type Mutation {
    createUser(
        email: String!
        name: String!
        lastname: String!
        username: String!
        password: String!
        role: Role!
    ): User!

    createOffer(
        title: String!
        description: String!
        company: String!
        location: String!
        domain: String!
        startDate: Date!
        endDate: Date!
        type: OfferType!
    ): Offer!

    applyToOffer(
        studentId: ID!
        offerId: ID!
    ): Application!
}