scalar Date
scalar JSON

# =======================
# ENUMS
# =======================

enum ApplicationStatus {
    PENDING
    ACCEPTED
    REJECTED
    WITHDRAWN
}

enum OfferType {
    INTERNSHIP
    PFE
    RESEARCH
    PHD
}

enum Role {
    STUDENT
    RECRUITER
    TEACHER
    ADMIN
}

enum SkillLevel {
    BEGINNER
    INTERMEDIATE
    ADVANCED
    EXPERT
}

# =======================
# BASE TYPE
# =======================

interface BaseEntity {
    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# CORE TYPES
# =======================

type User implements BaseEntity {
    id: ID!
    email: String!
    name: String!
    lastname: String!
    username: String!
    role: Role!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# SKILLS
# =======================

type Skill {
    id: Int!
    name: String!
}

type SkillAssignment {
    skill: Skill!
    level: SkillLevel
}

# =======================
# CV
# =======================

type Project {
    id: ID!
    cvId: ID!
    title: String!
    description: String!
    technologies: [String!]!
}

type Experience {
    id: ID!
    cvId: ID!
    company: String!
    role: String!
    duration: String!
    description: String
}

type CV implements BaseEntity {
    id: ID!
    studentId: ID!

    fileUrl: String!
    parsedData: JSON

    skills: [String!]!
    projects: [Project!]!
    experiences: [Experience!]!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# OFFER
# =======================

type Offer implements BaseEntity {
    id: ID!
    creatorId: ID!

    title: String!
    description: String!

    company: String!
    location: String!
    domain: String!

    startDate: Date!
    endDate: Date!

    requiredSkills: [SkillAssignment!]!
    type: OfferType!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# APPLICATION
# =======================

type Application implements BaseEntity {
    id: ID!
    studentId: ID!
    offerId: ID!

    status: ApplicationStatus!
    matchScore: Float!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# INTERVIEW
# =======================

type Interview {
    id: ID!
    studentId: ID!
    offerId: ID!

    score: Float!
    feedback: String!
    summary: String
}

# =======================
# RECOMMENDATION
# =======================

type Recommendation implements BaseEntity {
    id: ID!
    teacherId: ID!
    studentId: ID!
    description: String!

    createdAt: Date
    updatedAt: Date
    deletedAt: Date
}

# =======================
# PROFILES
# =======================

type StudentProfile {
    userId: ID!

    cvs: [CV!]!
    skills: [SkillAssignment!]!
    applications: [Application!]!
}

type RecruiterProfile {
    userId: ID!
    company: String!
    offers: [Offer!]!
}

type TeacherProfile {
    userId: ID!
    recommendations: [Recommendation!]!
    offers: [Offer!]!
}

# =======================
# ROOT TYPES
# =======================

type Query {
    # Users
    user(id: ID!): User
    users: [User!]!

    # Offers
    offer(id: ID!): Offer
    offers: [Offer!]!

    # Applications
    application(id: ID!): Application
    applications: [Application!]!

    # Profiles
    studentProfile(userId: ID!): StudentProfile
    recruiterProfile(userId: ID!): RecruiterProfile
    teacherProfile(userId: ID!): TeacherProfile

    # CV
    cv(id: ID!): CV
    cvsByStudent(studentId: ID!): [CV!]!
}

type Mutation {
    # Example mutations (à adapter avec tes Commands CQRS)

    createUser(
        email: String!
        name: String!
        lastname: String!
        username: String!
        password: String!
        role: Role!
    ): User!

    createOffer(
        title: String!
        description: String!
        company: String!
        location: String!
        domain: String!
        startDate: Date!
        endDate: Date!
        type: OfferType!
    ): Offer!

    applyToOffer(
        studentId: ID!
        offerId: ID!
    ): Application!
}